<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 600 100'
    width='600px' height='100px'>

    <image href='https://raw.githubusercontent.com/prowebleo/prowebleo/main/55.png' width='600' height='100' preserveAspectRatio='xMidYMid slice'/>
    <rect width='600' height='100' fill='rgba(0,0,0,0.35)'/>

    <path id='p0'><animate id='d0' attributeName='d' begin='0s;d4.end' dur='5000ms' fill='remove' values='m0,50 h0 ; m0,50 h600 ; m0,50 h600 ; m0,50 h0' keyTimes='0;0.8;0.8;1'/></path>
    <text font-family='"Time New Roman", monospace' fill='#ffffff' font-size='25' dominant-baseline='middle' x='50%' text-anchor='middle'>
        <textPath xlink:href='#p0'>Automation &amp; Data Systems</textPath>
    </text>

    <path id='p1'><animate id='d1' attributeName='d' begin='d0.end' dur='5000ms' fill='remove' values='m0,50 h0 ; m0,50 h600 ; m0,50 h600 ; m0,50 h0' keyTimes='0;0.8;0.8;1'/></path>
    <text font-family='"Time New Roman", monospace' fill='#ffffff' font-size='25' dominant-baseline='middle' x='50%' text-anchor='middle'>
        <textPath xlink:href='#p1'>Web Scraping &amp; Pipelines</textPath>
    </text>

    <path id='p2'><animate id='d2' attributeName='d' begin='d1.end' dur='5000ms' fill='remove' values='m0,50 h0 ; m0,50 h600 ; m0,50 h600 ; m0,50 h0' keyTimes='0;0.8;0.8;1'/></path>
    <text font-family='"Time New Roman", monospace' fill='#ffffff' font-size='25' dominant-baseline='middle' x='50%' text-anchor='middle'>
        <textPath xlink:href='#p2'>Analytics Dashboards</textPath>
    </text>

    <path id='p3'><animate id='d3' attributeName='d' begin='d2.end' dur='5000ms' fill='remove' values='m0,50 h0 ; m0,50 h600 ; m0,50 h600 ; m0,50 h0' keyTimes='0;0.8;0.8;1'/></path>
    <text font-family='"Time New Roman", monospace' fill='#ffffff' font-size='25' dominant-baseline='middle' x='50%' text-anchor='middle'>
        <textPath xlink:href='#p3'>Python &amp; TypeScript</textPath>
    </text>

    <path id='p4'><animate id='d4' attributeName='d' begin='d3.end' dur='5000ms' fill='remove' values='m0,50 h0 ; m0,50 h600 ; m0,50 h600 ; m0,50 h0' keyTimes='0;0.8;0.8;1'/></path>
    <text font-family='"Time New Roman", monospace' fill='#ffffff' font-size='25' dominant-baseline='middle' x='50%' text-anchor='middle'>
        <textPath xlink:href='#p4'>Always learning new things</textPath>
    </text>
</svg>
